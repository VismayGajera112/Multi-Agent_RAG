global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: multi-agent-rag

scrape_configs:
  # Prometheus' own metrics
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI app — prometheus-fastapi-instrumentator exposes /metrics
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Celery worker metrics via celery-exporter (consumes task events)
  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  # Embedding-pipeline worker metrics (app-native, multiprocess registry)
  - job_name: celery-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9809"]

  # RabbitMQ — built-in rabbitmq_prometheus plugin on :15692
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]

  # OpenTelemetry Collector — own telemetry (:8888) + prometheus exporter (:8889)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]
