server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable static-asset caching.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Single-page app: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Reverse proxy: /api/* -> FastAPI backend (same docker network).
    # The trailing slash on proxy_pass strips the "/api" prefix, so
    # /api/chat/stream maps to http://api:8000/chat/stream.
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / token streaming: never buffer, keep the connection open.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
