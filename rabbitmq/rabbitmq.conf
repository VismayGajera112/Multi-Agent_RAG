# RabbitMQ broker configuration
# Topology (vhosts, exchanges, queues, bindings) is declared declaratively
# and imported on every boot from definitions.json — this is what guarantees
# the durable queues + dead-letter exchange exist before any worker connects.
load_definitions = /etc/rabbitmq/definitions.json

# Listeners
listeners.tcp.default = 5672
management.tcp.port = 15672

# Prometheus scrape endpoint (rabbitmq_prometheus plugin) -> :15692/metrics
prometheus.tcp.port = 15692
prometheus.return_per_object_metrics = true

# Memory / disk safety thresholds for a local single-node broker
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 1GB

# Surface log lines on stdout so `docker compose logs rabbitmq` is useful
log.console = true
log.console.level = info
