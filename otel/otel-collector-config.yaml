# OpenTelemetry Collector configuration.
# Receives OTLP (traces/metrics) from the FastAPI app + Celery worker, runs a
# tracing pipeline, and re-exposes collected metrics for Prometheus to scrape.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  # Traces: print to collector logs (swap for Jaeger/Tempo when available).
  debug:
    verbosity: normal
  # Metrics: re-export in Prometheus format on :8889 for the prometheus scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      level: detailed
      address: 0.0.0.0:8888
  pipelines:
    # Tracing pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    # Metrics pipeline
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
